<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إخلاء الطرف | التجمع الصحي الثاني</title>
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}"/>
    <link rel="stylesheet" href="{{ url_for('static', filename='ShortPrograms.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='Logo1.webp') }}">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .clearance-wrapper {
            max-width: 900px;
            margin: 40px auto;
            background: white;
            padding: 0;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            border: 1px solid #eee;
        }
        .form-header-main {
            background: #0b3c5d;
            color: white;
            padding: 20px;
            text-align: center;
            font-weight: 800;
            font-size: 22px;
            border-bottom: 5px solid #28a745; /* خط تمييز أخضر للنماذج */
        }
        .form-body { padding: 30px; }
        .grid-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
            border-bottom: 1px solid #f8f9fa;
            padding-bottom: 15px;
        }
        .form-group label {
            display: block;
            font-weight: 700;
            margin-bottom: 8px;
            color: #0b3c5d;
            font-size: 14px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
            font-family: 'Almarai';
            transition: 0.3s;
        }
        .form-group input:focus { border-color: #0b5fb3; box-shadow: 0 0 8px rgba(11,95,179,0.1); }
        .submit-area { text-align: center; margin-top: 30px; }
        
        @media (max-width: 768px) { .grid-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <header style="display: flex; justify-content: space-between; align-items: center; padding: 10px 5%;">
        <a href="/" class="logo-section">
            <img src="{{ url_for('static', filename='Logo.jpg') }}" alt="شعار التجمع" class="logo-img">
            <div class="logo-text">
                <h2>التجمع الصحي الثاني</h2>
                <span>Second Health Cluster</span>
            </div>
        </a>
        <div class="header-actions" style="display: flex; align-items: center; gap: 10px;">
            <button id="lang-switch-btn" onclick="toggleLanguage()" class="staff-login-btn">
                <i class="fas fa-globe"></i> 
                <span id="lang-text">English</span>
            </button>
            <a href="/login" class="staff-login-btn">
                <i class="fas fa-user-lock"></i>
                <span>دخول الموظفين</span>
            </a>
        </div>
    </header>

    <nav>
        <div class="nav-bar">
            <a href="/" class="nav-link">الرئيسية</a>
            <a href="/steps" class="nav-link">خطوات التسجيل</a>
            <a href="/programs" class="nav-link">البرامج القصيرة</a>
            <a href="/available" class="nav-link">الحلقات التطبيقية</a>
            <a href="/track" class="nav-link">متابعة الطلب</a>
            <a href="/clearance" class="nav-link active">إخلاء الطرف</a>
            <a href="/contact" class="nav-link">تواصل معنا</a>
        </div>
    </nav>

    <main class="clearance-wrapper">
        <div class="form-header-main">Clearance Form / نموذج إخلاء طرف</div>
        
        <div class="form-body">
            <form id="ClearanceForm" enctype="multipart/form-data">
                
                <div class="grid-row">
                    <div class="form-group">
                        <label>Date / التاريخ</label>
                        <input type="text" value="{{ datetime.now().strftime('%Y-%m-%d') }}" readonly>
                    </div>
                    <div class="form-group">
                        <label>Administration / الإدارة</label>
                        <select name="admin_name" required>
                            <option value="Medical Training">Medical Training Administration</option>
                            <option value="Nursing Education">Nursing Education Administration</option>
                            <option value="Volunteer Office">Volunteer Office</option>
                        </select>
                    </div>
                </div>

                <div class="grid-row">
                    <div class="form-group">
                        <label>Employee No. / رقم الموظف (المتدرب)</label>
                        <input type="text" name="employee_no" placeholder="أدخل رقمك التدريبي" required>
                    </div>
                    <div class="form-group">
                        <label>Nationality / الجنسية</label>
                        <select name="nationality">
                            <option value="Saudi">Saudi</option>
                            <option value="Non-Saudi">Non-Saudi</option>
                        </select>
                    </div>
                </div>

                <div class="grid-row">
                    <div class="form-group">
                        <label>Arabic Name / الاسم بالعربية</label>
                        <input type="text" name="name_ar" placeholder="كما في الهوية" required>
                    </div>
                    <div class="form-group">
                        <label>English Name / الاسم بالإنجليزية</label>
                        <input type="text" name="name_en" placeholder="As in Passport" required style="direction: ltr;">
                    </div>
                </div>

                <div class="grid-row">
                    <div class="form-group">
                        <label>ID Number / رقم الهوية</label>
                        <input type="text" name="national_id" maxlength="10" placeholder="10xxxxxxxx" required>
                    </div>
                    <div class="form-group">
                        <label>Mobile No. / رقم الجوال</label>
                        <input type="text" name="mobile" placeholder="05xxxxxxxx" required>
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 20px;">
                    <label><i class="fas fa-paperclip"></i> ID Badge Attachment / إرفاق صورة الهوية أو البطاقة</label>
                    <input type="file" name="attachment" accept="image/*,.pdf" style="padding: 10px; background: #f8f9fa;">
                </div>

                <div class="submit-area">
                    <button type="submit" class="staff-login-btn" style="padding: 15px 80px; font-size: 18px; border-radius: 12px; width: 100%; justify-content: center;">
                        إرسال الطلب / Submit Form
                    </button>
                </div>

            </form>
        </div>
    </main>

    <footer style="background: #0b3c5d; color: white; padding: 30px; text-align: center; margin-top: 50px;">
        <p style="opacity: 0.7; font-size: 14px;">&copy; 2026 التجمع الصحي الثاني - جميع الحقوق محفوظة</p>
    </footer>

    <script>
    document.getElementById("ClearanceForm").addEventListener("submit", function(e) {
        e.preventDefault(); // منع التحديث وظهور رسالة JSON الخام

        const formData = new FormData(this);

        // إظهار حالة جاري التحميل
        Swal.fire({
            title: 'جاري إرسال الطلب...',
            allowOutsideClick: false,
            didOpen: () => { Swal.showLoading(); }
        });

        fetch('/submit_clearance', {
            method: 'POST',
            body: formData
        })
        .then(response => response.json())
        .then(data => {
            if (data.status === "success") {
                Swal.fire({
                    title: 'تم الإرسال بنجاح!',
                    text: data.message,
                    icon: 'success',
                    confirmButtonText: 'حسناً',
                    confirmButtonColor: '#0b3c5d'
                }).then(() => {
                    window.location.href = "/"; // العودة للرئيسية
                });
            } else {
                Swal.fire({
                    title: 'خطأ في الإرسال',
                    text: data.message,
                    icon: 'error',
                    confirmButtonText: 'حاول مجدداً'
                });
            }
        })
        .catch(error => {
            Swal.fire({
                title: 'خطأ تقني',
                text: 'حدث خطأ أثناء الاتصال بالسيرفر',
                icon: 'error'
            });
        });
    });
    </script>
    
    <script src="{{ url_for('static', filename='translator.js') }}"></script>

</body>
</html>
